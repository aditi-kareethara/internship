<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palmer Archipelago Penguin Predictor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #eef2f5;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #34495e;
        }
        input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3498db;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Penguin Species Predictor</h2>
    <form id="predictorForm">
        <div class="form-group">
            <label for="culmen_length">Culmen Length (mm)</label>
            <input type="number" id="culmen_length" step="0.1" value="39.1" required>
        </div>
        <div class="form-group">
            <label for="culmen_depth">Culmen Depth (mm)</label>
            <input type="number" id="culmen_depth" step="0.1" value="18.7" required>
        </div>
        <div class="form-group">
            <label for="flipper_length">Flipper Length (mm)</label>
            <input type="number" id="flipper_length" step="1" value="181" required>
        </div>
        <div class="form-group">
            <label for="body_mass">Body Mass (g)</label>
            <input type="number" id="body_mass" step="10" value="3750" required>
        </div>
        <div class="form-group">
            <label for="sex">Sex</label>
            <select id="sex">
                <option value="1">MALE</option>
                <option value="0">FEMALE</option>
            </select>
        </div>
        <div class="form-group">
            <label for="island">Island</label>
            <select id="island">
                <option value="Torgersen">Torgersen</option>
                <option value="Biscoe">Biscoe</option>
                <option value="Dream">Dream</option>
            </select>
        </div>
        <button type="submit">Predict Species</button>
    </form>

    <div id="result" class="result-box"></div>
</div>

<script>
    document.getElementById('predictorForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'none';

        // 1. Extract values from human-friendly dropdown inputs
        const selectedIsland = document.getElementById('island').value;
        const sexValue = parseInt(document.getElementById('sex').value);

        // 2. Map chosen island dynamically into individual boolean fields expected by the API
        const payload = {
            culmen_length_mm: parseFloat(document.getElementById('culmen_length').value),
            culmen_depth_mm: parseFloat(document.getElementById('culmen_depth').value),
            flipper_length_mm: parseFloat(document.getElementById('flipper_length').value),
            body_mass_g: parseFloat(document.getElementById('body_mass').value),
            sex: sexValue,
            island_Biscoe: selectedIsland === 'Biscoe',
            island_Dream: selectedIsland === 'Dream',
            island_Torgersen: selectedIsland === 'Torgersen'
        };

        try {
            // 3. Send AJAX request directly to your local FastAPI server
            const response = await fetch('http://127.0.0.1:8000/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (response.ok && !result.error) {
                resultDiv.className = 'result-box success';
                resultDiv.innerHTML = `Predicted Species: <strong>${result.predicted_species}</strong><br><small>(Class Class: ${result.prediction_class})</small>`;
            } else {
                resultDiv.className = 'result-box error';
                resultDiv.innerText = `Error: ${result.error || 'Failed to parse response'}`;
            }
        } catch (err) {
            resultDiv.className = 'result-box error';
            resultDiv.innerText = 'Could not connect to the API. Make sure FastAPI server is running!';
        }

        resultDiv.style.display = 'block';
    });
</script>

</body>
</html>
